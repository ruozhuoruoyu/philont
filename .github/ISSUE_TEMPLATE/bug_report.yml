name: Bug report
description: Report a problem with Philont
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! For **security vulnerabilities**, do not use this
        form — follow [SECURITY.md](../blob/main/SECURITY.md) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands or actions that trigger the bug.
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste the full error output. This will be rendered as code.
      render: shell
  - type: input
    id: package
    attributes:
      label: Affected package(s)
      placeholder: e.g. agent-policy, server, web-ui
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, model provider.
      placeholder: |
        - OS: Ubuntu 22.04
        - Node: v20.11.0
        - LLM_PROVIDER: anthropic
    validations:
      required: true
