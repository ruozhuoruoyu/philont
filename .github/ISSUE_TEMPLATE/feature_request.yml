name: Feature request
description: Suggest an idea or enhancement for Philont
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point motivating the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? How might it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why they fall short.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links, mockups, related issues.
