name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & test (TypeScript)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      # Packages depend on each other via file: links, so install+build them in
      # dependency order before running any tests.
      - name: Build & test packages in dependency order
        run: |
          set -e
          for pkg in agent-policy agent-tools agent-mcp agent-plugins agent-memory; do
            echo "::group::$pkg"
            cd "$pkg"
            npm install --no-audit --no-fund
            npm run build
            npm test
            cd ..
            echo "::endgroup::"
          done

  typecheck:
    name: Type-check server & web-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Build libraries, then type-check apps
        run: |
          set -e
          for pkg in agent-policy agent-tools agent-mcp agent-plugins agent-memory; do
            (cd "$pkg" && npm install --no-audit --no-fund && npm run build)
          done
          for app in server web-ui; do
            echo "::group::$app"
            (cd "$app" && npm install --no-audit --no-fund && npx tsc --noEmit)
            echo "::endgroup::"
          done
